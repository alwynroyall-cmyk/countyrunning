name: Windows CI

on:
  push:
    branches:
      - main
      - League-Report-Cleanup
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-stage-checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-cov

      - name: Run unit tests
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -q tests/unit --cov=league_scorer --cov-report=term-missing

      - name: Run staged checks (skip if no season data)
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/run_staged_checks.py --year 1999 --allow-missing-data --report-dir output/staged-checks

      - name: Upload staged-check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staged-check-reports
          path: output/staged-checks
